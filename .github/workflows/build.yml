name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-macos:
    runs-on: macos-14

    env:
      HOMEBREW_PREFIX: /opt/homebrew

    steps:
    - name: Install dependencies
      run: |
        brew install autoconf automake libtool pkg-config check cmake sdl3

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Build SDL_shadercross
      run: |
        git clone --depth 1 https://github.com/libsdl-org/SDL_shadercross.git SDL_shadercross
        cmake -S SDL_shadercross -B SDL_shadercross/build \
          -DSDLSHADERCROSS_DXC=OFF \
          -DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF \
          -DCMAKE_PREFIX_PATH=/opt/homebrew
        cmake --build SDL_shadercross/build
        sudo cmake --install SDL_shadercross/build
        sudo cp SDL_shadercross/build/shadercross /usr/local/bin/
        sudo install_name_tool -add_rpath /usr/local/lib /usr/local/bin/shadercross

    - name: Checkout ObjectivelyGPU
      uses: actions/checkout@v6

    - name: Build
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          libcurl4-openssl-dev \
          libgl-dev \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
          libxfixes-dev libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
          libdrm-dev libgbm-dev libdecor-0-dev libasound2-dev \
          check \
          cmake

    - name: Build SDL3
      run: |
        git clone --depth 1 --branch release-3.4.2 https://github.com/libsdl-org/SDL.git SDL3
        cmake -S SDL3 -B SDL3/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3/build -j$(nproc)
        sudo cmake --install SDL3/build

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Refresh shared library cache
      run: sudo ldconfig

    - name: Checkout ObjectivelyGPU
      uses: actions/checkout@v6

    - name: Build
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make
