name: Release

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Create release
      run: |
        gh release create ${{ github.ref_name }}           --title "ObjectivelyGPU ${{ github.ref_name }}"           --generate-notes
      env:
        GH_TOKEN: ${{ github.token }}
