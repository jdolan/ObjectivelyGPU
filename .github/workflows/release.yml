name: Release

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write

jobs:
  release-xcframework:
    runs-on: macos-14

    env:
      IOS_MIN: "14.0"

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download dependency xcframeworks
      run: |
        mkdir -p Frameworks
        gh release download --repo jdolan/Objectively --pattern "Objectively.xcframework.zip" -D Frameworks/
        gh release download --repo jdolan/ObjectivelyMVC --pattern "SDL3.xcframework.zip" -D Frameworks/
        cd Frameworks && unzip -q Objectively.xcframework.zip && unzip -q SDL3.xcframework.zip && rm *.zip
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Build xcframework
      run: bash scripts/build-xcframework.sh

    - name: Zip xcframework
      run: |
        cd Frameworks
        zip -r ../ObjectivelyGPU.xcframework.zip ObjectivelyGPU.xcframework

    - name: Create release
      run: |
        gh release delete ${{ github.ref_name }} --yes || true
        gh release create ${{ github.ref_name }} \
          --title "ObjectivelyGPU ${{ github.ref_name }}" \
          --generate-notes \
          ObjectivelyGPU.xcframework.zip
      env:
        GH_TOKEN: ${{ github.token }}
